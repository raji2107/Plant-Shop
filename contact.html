<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plant  Paradise - Contact</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

/* BODY */
body{
    background:#42e64a;
    min-height:100vh;
}

/* NAVBAR */
nav{
    background:linear-gradient(#17921d);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

nav h1{
    color:white;
    font-size:28px;
}

nav ul{
    display:flex;
    list-style:none;
}

nav ul li{
    margin-left:25px;
}

nav ul li a{
    color:white;
    text-decoration:none;
    font-weight:bold;
    transition:.3s;
}

nav ul li a:hover{
    color:#d4fc79;
}

/* CONTACT SECTION */
.contact-container{
    max-width:1300px;
    margin:50px auto;
    display:flex;
    gap:40px;
    align-items:center;
    justify-content:center;
    padding:20px;
}

/* LEFT SIDE PLANTS */
.contact-image{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

.plant-circle-gallery{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

.plant-circle-gallery img{
    width:130px;
    height:130px;
    object-fit:cover;
    border-radius:50%;
    border:5px solid white;
    box-shadow:0 8px 20px rgba(0,0,0,0.25);
    transition:0.4s;
}

.plant-circle-gallery img:hover{
    transform:scale(1.1) rotate(5deg);
}

/* RIGHT SIDE */
.contact-box{
    flex:1;
    background:rgba(255,255,255,0.95);
    padding:35px;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.contact-box h1{
    color:#1b5e20;
    margin-bottom:15px;
}

.contact-box p{
    color:#333;
    line-height:1.7;
}

/* COMPANY INFO */
.company-info{
    background:#18be26;
    margin:25px 0;
    padding:20px;
    border-radius:15px;
    border-left:6px solid #2e7d32;
}

.company-info h2{
    color:#1b5e20;
    margin-bottom:10px;
}

.company-info p{
    margin-bottom:8px;
}

/* FORM */
form{
    margin-top:20px;
}

form input,
form textarea{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:2px solid #c8e6c9;
    border-radius:12px;
    outline:none;
    font-size:15px;
}

form input:focus,
form textarea:focus{
    border-color:#2e7d32;
}

form button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#2e7d32;
    color:white;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

form button:hover{
    background:#43a047;
}

/* FOOTER */
footer{
    text-align:center;
    background:#1b5e20;
    color:white;
    padding:20px;
    margin-top:40px;
}

/* MOBILE */
@media(max-width:768px){

    nav{
        flex-direction:column;
    }

    nav ul{
        margin-top:15px;
        flex-wrap:wrap;
        justify-content:center;
    }

    .contact-container{
        flex-direction:column;
    }

    .plant-circle-gallery{
        grid-template-columns:repeat(2,1fr);
    }

    .plant-circle-gallery img{
        width:110px;
        height:110px;
    }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
   <h1> 🌱Plant Paradise</h1>

    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
</nav>

<!-- CONTACT SECTION -->
<div class="contact-container">

    <!-- LEFT SIDE -->
    <div class="contact-image">

        <div class="plant-circle-gallery">
            <img src="images/plant1.jpg">
            <img src="images/plant2.11.jpg">
            <img src="images/plant3.jpg">
            <img src="images/plant4.jpg">
            <img src="images/plant5.jpg">
            <img src="images/plant6.jpg">
            <img src="images/plant7.jpg">
            <img src="images/plant8.jpg">
            <img src="images/plant9.jpg">
        </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="contact-box">

        <h1>🌿 Contact Us</h1>

        <p>
            Bringing Nature Closer To You 🌱
        </p>

        <div class="company-info">
            <h2>🏢 Company Details</h2>
            <p><strong>🌿 PLANT POT PARADISE</strong></p>
            <p>📞 9456200777</p>
            <p>📧 idol07@gmail.com</p>
            <p>📍 Sivakasi</p>
        </div>

        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea rows="5" placeholder="Your Message"></textarea>
            <button type="submit">🌿 Send Message</button>
        </form>

    </div>

</div>

<!-- FOOTER -->
<footer>
    🌱 Plant  Paradise | Green World 🌿
</footer>

</body>
</html>
