<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

/* ================= GREEN BACKGROUND FIX ================= */

body{
    background:#5cd362;
    
    min-height:100vh;
}

/* NAVBAR */

nav{
    background:linear-gradient #1b5e20;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

nav h1{
    color:rgb(5, 5, 5);
    font-size:28px;
}

nav ul{
    display:flex;
    list-style:none;
}

nav ul li{
    margin-left:25px;
}

nav ul li a{
    color:white;
    text-decoration:none;
    font-weight:bold;
    transition:.3s;
}

nav ul li a:hover{
    color:#d4fc79;
}

/* CONTACT SECTION */

.contact-container{
    max-width:1200px;
    margin:50px auto;
    display:flex;
    gap:40px;
    align-items:center;
    justify-content:center;
    padding:20px;
}

/* LEFT SIDE */

.contact-image{
    flex:1;
    text-align:center;
}

.main-image{
    width:100%;
    max-width:450px;
    height:450px;
    object-fit:cover;
    border-radius:25px;
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.plant-gallery{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:20px;
}

.plant-gallery img{
    width:110px;
    height:110px;
    object-fit:cover;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    transition:.4s;
}

.plant-gallery img:hover{
    transform:scale(1.1);
}

/* RIGHT SIDE */

.contact-box{
    flex:1;
    background:rgba(245, 248, 244, 0.932);
    backdrop-filter:blur(10px);
    padding:35px;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.contact-box h1{
    color:#1e1f1e;
    margin-bottom:15px;
}

.contact-box p{
    line-height:1.7;
    color:#333;
}

/* COMPANY INFO */

.company-info{
    background:#06e619;
    margin:25px 0;
    padding:20px;
    border-radius:15px;
    border-left:5px solid #2e7d32;
}
s
.company-info h3{
    color:#94e994;
    margin-bottom:10px;
}

.company-info p{
    margin-bottom:8px;
}

/* FORM */

form{
    margin-top:20px;
}

form input,
form textarea{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:2px solid #c8e6c9;
    border-radius:12px;
    outline:none;
    font-size:15px;
    background:#f1fff3;
}

form input:focus,
form textarea:focus{
    border-color:#e3ebe4;
    background:white;
}

form button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#2e7d32;
    color:white;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

form button:hover{
    background:#3aa741;
    transform:translateY(-2px);
}

/* FOOTER */

footer{
    text-align:center;
    background:#1a6820;
    color:white;
    padding:20px;
    margin-top:40px;
}

/* MOBILE */

@media(max-width:768px){

    nav{
        flex-direction:column;
    }

    nav ul{
        margin-top:15px;
        flex-wrap:wrap;
        justify-content:center;
    }

    .contact-container{
        flex-direction:column;
    }

    .main-image{
        height:300px;
    }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <h1>🌱 Plant Pot Paradise</h1>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
</nav>

<!-- CONTACT SECTION -->
<div class="contact-container">

    <div class="contact-image">

        <img src="images/logo1.jpg" class="main-image">

        <div class="plant-gallery">
            <img src="images/plant1.jpg">
            <img src="images/plant2.jpg">
            <img src="images/plant3.jpg">
            <img src="images/plant3.jpg">
            <img src="images/plant3.jpg">
        </div>

    </div>

    <div class="contact-box">

        <h1>🌿 Contact Us</h1>

        <p>
            Bringing Nature Closer To You 🌱
        </p>

        <div class="company-info">
            <h2>🏢 Company Details</h2>
            <P><strong>🌿PLANT POT PARADISE</strong></P>
            <p>📞 9456200777</p>
            <p>📧 idol07@gmail.com</p>
            <p>📍 Sivakasi</p>
        </div>

        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea rows="5" placeholder="Your Message"></textarea>
            <button type="submit">🌿 Send Message</button>
        </form>

    </div>

</div>

<!-- FOOTER -->
<footer>
    🌱 Plant Pot Paradise | Green World 🌿
</footer>

</body>
</html>
